/* ---------- formatting ---------- */
const nf0 = new Intl.NumberFormat('en-US',{maximumFractionDigits:0});
const fmtNIS = v => '₪' + nf0.format(Math.round(v));
const fmtSign = v => (v>=0?'+':'−') + nf0.format(Math.abs(Math.round(v)));
/* per-household annual figures are stored as ₪/year; the dashboard shows them
   as ₪/household/month (÷12) to match the published paper's units. */
const fmtNISm  = v => fmtNIS(v/12);
const fmtSignM = v => fmtSign(v/12);
const fmtBnPlain = v => (v>=0?'':'−') + '₪' + Math.abs(v).toFixed(1) + 'B';
const fmtPct = v => (v>=0?'+':'−') + Math.abs(v).toFixed(0) + '%';
const C = getComputedStyle(document.documentElement);
const col = n => C.getPropertyValue(n).trim();
Chart.defaults.font.family = "'Helvetica Neue',Arial,sans-serif";
Chart.defaults.font.size = 12;
Chart.defaults.color = col('--muted');

/* ---------- real-terms (2018 ₪) dataset ---------- */
/* Cumulative CPI inflation 2018→2023 in Israel ≈ 10.6% (annual-average index
   chained 2019-2023: 1.008·0.994·1.015·1.044·1.042 ≈ 1.106). 2023 nominal ₪
   are deflated to 2018 ₪ by dividing by this factor. */
const CPI = 1.106;
function buildReal(src, cpi){
  const d = JSON.parse(JSON.stringify(src));
  const def = x => (x==null ? x : x/cpi);
  ['tax_bn','transfer_bn','net_bn','net_hh','tax_hh','transfer_hh'].forEach(k=>{
    if(d.state && d.state['2023'] && d.state['2023'][k]!=null) d.state['2023'][k]=def(src.state['2023'][k]);
  });
  d.sector_order.forEach(s=>{
    const S=d.sectors[s], O=src.sectors[s];
    ['net_hh','tax_hh','transfer_hh','total_fisc_bn','tax_bn','transfer_bn'].forEach(k=>{
      if(S[k] && S[k]['2023']!=null) S[k]['2023']=def(O[k]['2023']);
    });
    if(S.demo && S.demo.income_m && S.demo.income_m['2023']!=null)
      S.demo.income_m['2023']=def(O.demo.income_m['2023']);
    ['tax_items','transfer_items'].forEach(key=>{
      (S[key]||[]).forEach((it,i)=>{ it.v2023=def(O[key][i].v2023); it.pct=(it.v2023/it.v2018-1)*100; });
    });
  });
  if(d.decile) d.decile.forEach((row,i)=>{ row.net2023=def(src.decile[i].net2023); row.delta=row.net2023-row.net2018; });
  /* recompute the waterfall in real terms: population effect uses the
     unchanged 2018 net/HH; rate effect uses the deflated 2023 net/HH. */
  const wf=d.waterfall;
  wf.start = d.state['2018'].net_bn;
  wf.end   = d.state['2023'].net_bn;
  d.sector_order.forEach(s=>{
    const S=d.sectors[s];
    const nhh18=S.nhh_m['2018'], nhh23=S.nhh_m['2023'];
    const nh18=S.net_hh['2018'], nh23=S.net_hh['2023'];
    const pop=(nhh23-nhh18)*nh18/1000;
    const rate=(nh23-nh18)*nhh23/1000;
    wf.sectors[s]={pop,rate,total:pop+rate};
  });
  return d;
}
const DATA_REAL = buildReal(DATA, CPI);

/* one shared sector selection across both dashboard tabs */
let SECTOR = DATA.sector_order[0];
const MODES = [
  {sfx:'',  data:DATA,      note:''},
  {sfx:'R', data:DATA_REAL, note:`All shekel values shown in <b>real 2018 ₪</b>: the 2023 nominal figures have been deflated by cumulative CPI inflation of ${((CPI-1)*100).toFixed(1)}% (÷${CPI}). The 2018 column is unchanged, so every change here is a <b>real</b> change.`}
];

/* ---------- dashboard markup (shared by both tabs) ---------- */
function dashMarkup(sfx, note){
  return `
  <div class="toolbar">
    <div class="legend-inline">
      <span><span class="dot" style="background:var(--blue)"></span>Income side — taxes paid</span>
      <span><span class="dot" style="background:var(--amber)"></span>Transfer side — benefits received</span>
    </div>
  </div>
  ${note?`<div class="attrib" style="margin-top:14px">${note}</div>`:''}
  <section><div class="card">
    <h2>Bridging the state's net fiscal balance, 2018 → 2023</h2>
    <p class="cap">Each sector splits into a <b>population effect</b> (more / fewer households at the old net rate) and a <b>rate effect</b> (change in net ₪/household, at current household counts). ₪ billions.</p>
    <div class="chartbox" style="height:380px"><canvas id="wf${sfx}"></canvas></div>
  </div></section>
  <section><div class="card">
    <h2>Who funds the state — total net fiscal contribution by sector</h2>
    <p class="cap">National annual ₪B. Positive = net contributor; negative = net beneficiary. 2018 vs 2023 (% change in tooltip).</p>
    <div class="chartbox" style="height:320px"><canvas id="contrib${sfx}"></canvas></div>
  </div></section>
  <section>
    <h2 class="sans" style="font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;">Drill down by sector</h2>
    <div class="secbtns" id="secBtns${sfx}"></div>
  </section>
  <section><div class="grid2">
    <div class="card">
      <h2 id="ioTitle${sfx}">Income &amp; transfer composition</h2>
      <p class="cap">Per household, <b>monthly</b> ₪. <span class="pill io-in">Income</span> taxes paid · <span class="pill io-out">Transfer</span> benefits received. "% of total" is each line's share of 2023 taxes / transfers.</p>
      <div id="ioTable${sfx}"></div>
    </div>
    <div class="card">
      <h2 id="demoTitle${sfx}">Sector profile</h2>
      <p class="cap">Net fiscal position per household, with demographic context. <b>Large = 2023</b>, <span style="color:var(--grey)">small grey = 2018</span>.</p>
      <div class="headline"><div>
        <div class="big" id="netBig${sfx}">—</div>
        <div class="big sub">net ₪ / household / month</div>
      </div></div>
      <div class="demo" id="demoGrid${sfx}"></div>
    </div>
  </div></section>`;
}
document.getElementById('tab-dash').innerHTML = dashMarkup(MODES[0].sfx, MODES[0].note);
document.getElementById('tab-real').innerHTML = dashMarkup(MODES[1].sfx, MODES[1].note);

/* ============ HERO 1 : waterfall ============ */
function wlabel(sector, eff){ return sector.split(' ').concat([eff]); }
function buildWaterfall(data, sfx){
  const wf = data.waterfall;
  const steps = [];
  steps.push({label:['2018'],type:'anchor',val:wf.start});
  data.sector_order.forEach(s=>{
    const v = wf.sectors[s];
    steps.push({label:wlabel(s,'households'),type:'flow',val:v.pop});
    steps.push({label:wlabel(s,'net / HH'),type:'flow',val:v.rate});
  });
  steps.push({label:['2023'],type:'anchor',val:wf.end});
  let cum=0; const bars=[], fills=[], bords=[];
  steps.forEach(st=>{
    if(st.type==='anchor'){ bars.push([0,st.val]); fills.push(col('--navy')); bords.push(col('--navy')); cum=st.val; }
    else { const start=cum, end=cum+st.val; bars.push([start,end]); cum=end;
      const c = st.val>=0?col('--pos'):col('--neg'); fills.push(c); bords.push(c); }
  });
  new Chart(document.getElementById('wf'+sfx),{
    type:'bar',
    data:{ labels:steps.map(s=>s.label),
      datasets:[{ data:bars, backgroundColor:fills, borderColor:bords, borderWidth:1, borderRadius:3, barPercentage:.72, categoryPercentage:.84 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{callbacks:{ title:it=>{const s=steps[it[0].dataIndex];return (Array.isArray(s.label)?s.label.join(' · '):s.label);},
          label:it=>{const s=steps[it.dataIndex]; if(s.type==='anchor')return 'Net balance: '+fmtBnPlain(s.val);
            return (s.val>=0?'adds ':'removes ')+fmtBnPlain(Math.abs(s.val));}}}},
      scales:{ x:{grid:{display:false},ticks:{maxRotation:0,autoSkip:false,font:{size:10}}},
        y:{grid:{color:col('--line')},ticks:{callback:v=>'₪'+v+'B'},title:{display:true,text:'net fiscal balance · ₪B'}}}}
  });
}

/* ============ HERO 2 : sector contribution ============ */
function buildContrib(data, sfx){
  new Chart(document.getElementById('contrib'+sfx),{
    type:'bar',
    data:{ labels:data.sector_order,
      datasets:[
        {label:'2018', data:data.sector_order.map(s=>data.sectors[s].total_fisc_bn['2018']),
          backgroundColor:col('--blue-soft'), borderRadius:3, barPercentage:.8},
        {label:'2023', data:data.sector_order.map(s=>data.sectors[s].total_fisc_bn['2023']),
          backgroundColor:col('--blue'), borderRadius:3, barPercentage:.8},
      ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:12,boxHeight:12}},
        tooltip:{callbacks:{
          label:it=>it.dataset.label+': '+fmtBnPlain(it.raw),
          footer:items=>{const s=data.sector_order[items[0].dataIndex];
            const a=data.sectors[s].total_fisc_bn['2018'], b=data.sectors[s].total_fisc_bn['2023'];
            return 'Change 2018→2023: '+fmtPct((b-a)/Math.abs(a)*100);}}}},
      scales:{x:{grid:{display:false}},
        y:{grid:{color:col('--line')},ticks:{callback:v=>'₪'+v+'B'},title:{display:true,text:'net contribution · ₪B'}}}}
  });
}

/* ============ sector buttons ============ */
function buildSecBtns(data, sfx){
  const secBtns = document.getElementById('secBtns'+sfx);
  data.sector_order.forEach(s=>{
    const b=document.createElement('button'); b.dataset.sec=s;
    b.innerHTML=`<div class="nm">${s}</div><div class="vv">net/HH ${fmtSignM(data.sectors[s].net_hh['2023'])}/mo · ${data.sectors[s].hh_share['2023'].toFixed(1)}% of HH</div>`;
    b.onclick=()=>{SECTOR=s; syncSec(); renderDrill();};
    secBtns.appendChild(b);
  });
}
function syncSec(){
  MODES.forEach(m=>{
    const c=document.getElementById('secBtns'+m.sfx);
    [...c.children].forEach(b=>b.classList.toggle('on', b.dataset.sec===SECTOR));
  });
}

/* ============ drill-down : financial table ============ */
function chgCell(p){ const cls = p>=0?'chg-pos':'chg-neg'; return `<td class="${cls}">${fmtPct(p)}</td>`; }
function rows(items, total23, cls){
  const shares = items.map(i=> i.v2023/total23*100);
  const maxShare = Math.max(...shares);
  return items.map((i,idx)=>{
    const share = shares[idx];
    const barW = Math.max(2, share/maxShare*46);
    return `<tr class="${cls}">
      <td class="lft">${i.name}</td>
      <td>${fmtNISm(i.v2018)}</td>
      <td>${fmtNISm(i.v2023)}</td>
      ${chgCell(i.pct)}
      <td class="sharecell"><span class="sharebar" style="width:${barW}px"></span><span class="shareval">${share.toFixed(1)}%</span></td>
    </tr>`;
  }).join('');
}
function totRow(label, t18, t23){
  const pct = (t23/t18 - 1) * 100;
  return `<tr class="tot">
    <td class="lft">${label}</td>
    <td>${fmtNISm(t18)}</td>
    <td>${fmtNISm(t23)}</td>
    ${chgCell(pct)}
    <td>100.0%</td>
  </tr>`;
}
function netRow(n18, n23){
  /* net = tax − transfer; % change relative to magnitude, same convention as
     the sector-contribution chart (positive = improved fiscal position). */
  const pct = (n23 - n18) / Math.abs(n18) * 100;
  const cell = v => `<td style="color:${v>=0?col('--pos'):col('--neg')}">${fmtSignM(v)}</td>`;
  return `<tr class="tot" style="background:#f4f6f8">
    <td class="lft">Net fiscal · tax − transfer</td>
    ${cell(n18)}
    ${cell(n23)}
    ${chgCell(pct)}
    <td>—</td>
  </tr>`;
}
function renderTable(data, sfx){
  const sec = data.sectors[SECTOR];
  const html = `<table class="fintbl">
    <thead><tr>
      <th class="lft">Line item · per household / month</th>
      <th>2018</th><th>2023</th><th>Δ %</th><th>% of total</th>
    </tr></thead>
    <tbody>
      <tr class="secthead t-in"><td colspan="5">Income · taxes paid</td></tr>
      ${rows(sec.tax_items, sec.tax_hh['2023'], 'grp-in')}
      ${totRow('Total taxes', sec.tax_hh['2018'], sec.tax_hh['2023'])}
      <tr class="secthead t-out"><td colspan="5">Transfers · benefits received</td></tr>
      ${rows(sec.transfer_items, sec.transfer_hh['2023'], 'grp-out')}
      ${totRow('Total transfers', sec.transfer_hh['2018'], sec.transfer_hh['2023'])}
      ${netRow(sec.net_hh['2018'], sec.net_hh['2023'])}
    </tbody></table>`;
  document.getElementById('ioTable'+sfx).innerHTML = html;
}

/* ============ demo card ============ */
function earnHTML(e){
  const seg=(w,c)=>`<i style="width:${w}%;background:${c}"></i>`;
  return `<div class="earnbar">${seg(e['0'],col('--grey'))}${seg(e['1'],col('--amber-soft'))}${seg(e['2plus'],col('--blue'))}</div>
   <div class="earnleg"><span><span class="dot" style="background:${col('--grey')}"></span>0 earners <b>${e['0'].toFixed(0)}%</b></span>
   <span><span class="dot" style="background:${col('--amber-soft')}"></span>1 <b>${e['1'].toFixed(0)}%</b></span>
   <span><span class="dot" style="background:${col('--blue')}"></span>2+ <b>${e['2plus'].toFixed(0)}%</b></span></div>`;
}
function metric(k, big, small, unit){
  const sm = (small===null||small===undefined)?'n/a':small;
  return `<div class="metric"><div class="k">${k}</div>
    <div class="v">${big}<small>${sm}</small></div>
    <div class="cap" style="margin:2px 0 0">${unit}</div></div>`;
}
function renderDemo(data, sfx){
  const sec=data.sectors[SECTOR], d=sec.demo;
  document.getElementById('demoTitle'+sfx).textContent = SECTOR+' — sector profile';
  document.getElementById('netBig'+sfx).textContent = fmtSignM(sec.net_hh['2023']);
  document.getElementById('netBig'+sfx).style.color = sec.net_hh['2023']>=0?col('--pos'):col('--neg');
  const p65b = d.pct65head['2023'], p65s=d.pct65head['2018'];
  const grid=document.getElementById('demoGrid'+sfx);
  grid.innerHTML =
     metric('Net income / HH', fmtNIS(d.income_m['2023']), fmtNIS(d.income_m['2018']), 'NIS / month')
   + metric('Persons / HH', d.persons['2023'].toFixed(2), d.persons['2018'].toFixed(2), 'avg household size')
   + metric('Children &lt;18 / HH', d.kids['2023'].toFixed(2), d.kids['2018'].toFixed(2), 'under-18s per household')
   + metric('Head aged 65+', (p65b===null?'n/a':p65b.toFixed(0)+'%'), (p65s===null?null:p65s.toFixed(0)+'%'), 'share of households')
   + `<div class="metric" style="grid-column:1/3"><div class="k">Earners per household · 2023</div>${earnHTML(d.earners['2023'])}</div>`;
}

function renderDrill(){ MODES.forEach(m=>{ renderTable(m.data, m.sfx); renderDemo(m.data, m.sfx); }); }

/* ============ tabs ============ */
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  const t=b.dataset.tab;
  document.getElementById('tab-dash').classList.toggle('hide', t!=='dash');
  document.getElementById('tab-real').classList.toggle('hide', t!=='real');
  document.getElementById('tab-method').classList.toggle('hide', t!=='method');
});

/* ============ methodology ============ */
const pv=DATA.provenance;
document.getElementById('methodBody').innerHTML = `
  <h3>What this is</h3>
  <p>A fiscal-incidence picture of Israel's three demographic sectors — Jewish non-Haredi, Haredi (ultra-Orthodox), and Arab — measuring, per household, every shekel of tax paid to the state against every shekel of transfer and in-kind benefit received from it. The <b>net fiscal position</b> is taxes paid minus benefits received. Per-household figures are shown as <b>₪ per household per month</b> to match the published paper; national aggregates stay in annual ₪ billions.</p>
  <p>The <b>Dashboard</b> tab is nominal — the 2018 column is in 2018 shekels and the 2023 column in 2023 shekels, so the change between them also reflects inflation and economic growth (nominal GDP rose about 38.5% over the period). The <b>Real terms · 2018 ₪</b> tab restates the 2023 figures in 2018 prices, deflating by cumulative CPI inflation of about ${((CPI-1)*100).toFixed(1)}% (÷${CPI}), so the change you see there is a real change.</p>

  <div class="attrib">
    <b>Method &amp; attribution.</b> The incidence framework — allocating taxes and public spending to households and netting them by population group — follows the methodology of:
    <p style="margin:8px 0 6px">
      <b>Ariel Karlinsky, Tom Sadeh, Eran Yogev &amp; Michael Sarel</b> (2024), &ldquo;<a href="https://www.kohelet.org.il/en/article/complete-fiscal-accounts-households-net-transfers-in-israel/" target="_blank" rel="noopener noreferrer">Complete Fiscal Accounts: Households&rsquo; Net Transfers in Israel</a>,&rdquo; <i>The Economic Quarterly</i>; also Bank of Israel Discussion Paper Series, vol.&nbsp;231 (2025).
    </p>
    This dashboard applies that approach to the fiscal years 2018 and 2023; full credit for the underlying methodology belongs to the authors.
  </div>

  <h3>Data sources</h3>
  <ul>
    <li><b>Demographics and household micro-data.</b> Israel Central Bureau of Statistics (CBS / הלמ״ס) <b>Household Expenditure Survey</b>. This is the survey on which the sector classifications, household weights, incomes and household composition are all measured.</li>
    <li><b>Tax and public-spending allocations.</b> Built on the CBS survey using the Karlinsky et&nbsp;al. incidence model, which maps national tax revenue and government expenditure down to individual households.</li>
  </ul>

  <h3>How it was constructed</h3>
  <ul>
    <li><b>Reference years.</b> "2018" pools the survey waves 2016–2018 and "2023" pools 2021–2023, which steadies the estimates for the smaller sectors. Each column is in that year's nominal shekels (the 2018 column is <i>not</i> rebased to 2023), so the 2018→2023 percentage change includes inflation and real growth.</li>
    <li><b>Waterfall decomposition.</b> Each sector's change in net contribution is split into a <b>population effect</b> — the change in the number of households, valued at the old net rate — and a <b>rate effect</b> — the change in net ₪ per household, valued at the current number of households. The two effects sum exactly to the sector's total change, and the three sectors sum to the +₪25.6B national swing.</li>
    <li><b>Sector definitions.</b> Jewish non-Haredi, Haredi (ultra-Orthodox) and Arab households are identified from the survey's nationality and religiosity classifications, using the same definitions throughout the fiscal and demographic figures.</li>
    <li><b>Weighting.</b> National totals, household counts and population shares use the survey's grossing-up weights (adjusted to align with national accounts); per-household demographic averages use the standard survey weights.</li>
    <li><b>Households with a 65+ head.</b> Based on the age of the economic head of each household as recorded in the survey.</li>
  </ul>

  <h3>Points to bear in mind</h3>
  <div class="flag">The demographic and fiscal figures are drawn from the same survey so that sectors, weights and household definitions line up exactly. Per-household demographic averages and grossed-up national totals use slightly different weighting, so reconciling a per-household figure against a national total will not be perfectly mechanical.</div>
  <div class="flag">Pooling three survey waves trades timeliness for stability; a single-year reading will differ, most noticeably for the smaller Haredi sample.</div>
  <div class="flag">Tax and spending incidence rests on the allocation assumptions of the Karlinsky et&nbsp;al. model (for example, who ultimately bears corporate tax and VAT). These are standard for this type of analysis but are assumptions, not observations.</div>
  <div class="flag"><b>Welfare in-kind, 2023.</b> CBS discontinued its in-kind welfare-services variable (STIK) for 2021–2023, so the 2023 welfare budget is distributed using the <b>2018 STIK decile-incidence profile</b>: fixed per-decile shares are applied to the 2023 income deciles, equal per household within each decile. This reproduces the 2018 shape of in-kind welfare but assumes that incidence is unchanged through 2023, and it does not capture sector-specific targeting within a decile.</div>
  <div class="flag"><b>Health &amp; education in-kind — 2018 keys, 2023 budgets.</b> Per-sector spending is not re-measured for 2023. <b>Education</b> (K-12) is allocated with the 2018 per-student cost vectors by sector and schooling level as fixed <i>relative</i> keys, then scaled so the total matches the 2023 budget (the bottom-up 2018-keyed total is lifted by a single factor of about 1.6×). <b>Public health</b> uses the same 2018 HMO capitation weights (by age, sex and periphery) scaled to the 2023 budget. In both, only the 2018 <i>shape</i> across households is reused and the overall level is rebased to 2023, so the sector pattern reflects the 2018 cost structure rather than any 2023 sector-budget update.</div>
  <div class="flag">The 2018 per-household figures were checked line by line against the published paper (see the allocation check below). Jewish non-Haredi and Arab sectors match within ±1%; the Haredi sector runs a few percent low, concentrated in the capital-based taxes (corporate tax, the financial component of VAT), most likely a small difference in the household-count denominator or the capital-income allocation key. It does not change the overall picture.</div>

  <h3>Allocation check vs. the published paper (2018)</h3>
  <p>The imputed items — indirect-tax incidence and in-kind public services — are allocated to households using the Karlinsky et&nbsp;al. keys; cash allowances are observed directly in the survey. Below, our per-household monthly averages (this dashboard, 2018) are set against the paper's rounded sector figures. Differences are shown both in % and in ₪ per household per month. <b>These figures are a replication and remain to be verified with the authors.</b></p>
  <table class="fintbl" style="margin-top:6px">
    <thead><tr>
      <th class="lft">Sector · 2018, ₪/HH/month</th>
      <th>This dashboard</th><th>Paper (≈)</th><th>Δ %</th><th>Δ ₪/mo</th>
    </tr></thead>
    <tbody>
      <tr class="secthead t-in"><td colspan="5">Total taxes paid</td></tr>
      <tr class="grp-in"><td class="lft">Jewish non-Haredi</td><td>₪14,052</td><td>₪14,000</td><td class="chg-pos">+0.4%</td><td class="chg-pos">+₪52</td></tr>
      <tr class="grp-in"><td class="lft">Haredi</td><td>₪8,467</td><td>₪8,800</td><td class="chg-neg">−3.8%</td><td class="chg-neg">−₪333</td></tr>
      <tr class="grp-in"><td class="lft">Arab</td><td>₪8,975</td><td>₪9,000</td><td class="chg-neg">−0.3%</td><td class="chg-neg">−₪25</td></tr>
      <tr class="secthead t-out"><td colspan="5">Total transfers received</td></tr>
      <tr class="grp-out"><td class="lft">Jewish non-Haredi</td><td>₪7,952</td><td>₪7,900</td><td class="chg-pos">+0.7%</td><td class="chg-pos">+₪52</td></tr>
      <tr class="grp-out"><td class="lft">Haredi</td><td>₪12,587</td><td>₪12,900</td><td class="chg-neg">−2.4%</td><td class="chg-neg">−₪313</td></tr>
      <tr class="grp-out"><td class="lft">Arab</td><td>₪10,023</td><td>₪10,100</td><td class="chg-neg">−0.8%</td><td class="chg-neg">−₪77</td></tr>
    </tbody>
  </table>
  <p class="small">National total taxes of ₪405B match the paper exactly. The per-sector gaps above sit inside the noise of rounding and pooled-wave sampling, except the Haredi capital-based taxes, which we have flagged for author review.</p>

  <h3>Sources &amp; credibility</h3>
  <p class="small"><b>Primary micro-data:</b> Israel Central Bureau of Statistics — Household Expenditure Survey. <b>Methodology:</b> after Karlinsky et&nbsp;al., fiscal balance of Israel's population groups.</p>
  <p class="small"><b>Units.</b> ${pv.units}</p>
  <p class="small">Figures are a research-grade replication and should be reviewed before any external or client use.</p>
`;
